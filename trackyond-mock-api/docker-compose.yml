services:
  db:
    image: postgres:16-alpine
    container_name: trackyond-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trackyond_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trackyond_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trackyond-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  trackyond-api:
    build: .
    container_name: trackyond-api
    user: root
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trackyond_db
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - GOOGLE_CLOUD_PROJECT=trackyond
      - FIREBASE_CREDENTIALS_JSON=/app/service-account.json
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: trackyond-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trackyond.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
